<!DOCTYPE html>
<!-- PepCoach — landing/index for the hosted legal + support site. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PepCoach</title>
  <meta name="description" content="PepCoach — the AI peptide coach, tracker, and reminder." />
  <style>
    :root { --bg: #ffffff; --fg: #16181c; --muted: #5b6169; --line: #e6e8ec; --card: #fbfbfc; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0b0c0e; --fg: #f2f3f5; --muted: #9aa0a8; --line: #23262b; --card: #131519; }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--fg); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font: 17px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card { max-width: 460px; padding: 40px 26px; text-align: center; }
    h1 { font-size: 34px; letter-spacing: -0.03em; margin: 0 0 8px; }
    p { color: var(--muted); margin: 0 0 28px; }
    .links { display: flex; flex-direction: column; gap: 10px; }
    .links a {
      display: block; padding: 14px 18px; border: 1px solid var(--line); border-radius: 12px;
      background: var(--card); color: var(--fg); text-decoration: none; font-weight: 600;
    }
    .links a:hover { border-color: var(--fg); }
  </style>
</head>
<body>
  <div class="card">
    <h1>PepCoach</h1>
    <p>The AI peptide coach, tracker, and reminder.</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
      <a href="support.html">Support</a>
    </div>
  </div>
</body>
</html>
